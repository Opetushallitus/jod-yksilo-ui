name: Backup
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0' # Weekly at 2:00 AM UTC
jobs:
  backup:
    name: Backup
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Needed to interact with GitHub's OIDC Token endpoint
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create tar archive
        run: |
          git clone --bare . ${{ github.event.repository.name }}.git
          tar -czf ${{ github.event.repository.name }}.git.tar.gz ${{ github.event.repository.name }}.git

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.JOD_BACKUP_AWS_ACCOUNT_ID }}:role/${{ secrets.JOD_BACKUP_AWS_GITHUB_ROLE_NAME}}
          aws-region: eu-west-1

      - name: Upload backup to S3
        run: |
          aws s3 cp ${{ github.event.repository.name }}.git.tar.gz s3://${{ secrets.JOD_BACKUP_AWS_BUCKET }}/${{ github.event.repository.name }}.git.tar.gz
