name: Build
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Needed to interact with GitHub's OIDC Token endpoint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Verify third-party action commits are at least 7 days old
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/verify-github-actions-min-commit-age.sh

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/krypton
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts && npm exec allow-scripts run

      - name: Run ESLint
        run: npx eslint . --report-unused-disable-directives --max-warnings 0

      - name: Run Prettier
        run: npx prettier . --check

      - name: Run translations:check
        run: npm run translations:check

      - name: Run Vitest unit tests
        run: npx vitest --coverage.enabled true

      - name: Upload Vitest report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.JOD_UTIL_AWS_ACCOUNT_ID }}:role/${{ secrets.JOD_UTIL_AWS_GITHUB_ROLE_NAME}}
          aws-region: eu-west-1

      - name: Copy third party assets from S3
        run: aws s3 sync --quiet s3://${{ secrets.JOD_UI_ASSETS }} ./assets

      - name: Run build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright e2e tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: dist
          path: dist/

  deploy-development:
    name: Deploy to development
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: build
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write # Needed to interact with GitHub's OIDC Token endpoint
      contents: write
      actions: read
    secrets: inherit
    with:
      environment: 'development'

  deploy-test:
    name: Deploy to test
    if: github.ref == 'refs/heads/main'
    needs: build
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write # Needed to interact with GitHub's OIDC Token endpoint
      contents: write
      actions: read
    secrets: inherit
    with:
      environment: 'test'

  deploy-production:
    name: Deploy to production
    if: github.ref == 'refs/heads/main'
    needs: build
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write # Needed to interact with GitHub's OIDC Token endpoint
      contents: write
      actions: read
    secrets: inherit
    with:
      environment: 'production'
